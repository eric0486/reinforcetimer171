<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord Countdown Timer</title>
  <style>
    /* ── Discord dark palette ─────────────────────────────────── */
    :root {
      --bg:     #2c2f33;
      --dark:   #23272a;
      --fg:     #ffffff;
      --accent: #7289da;
      --green:  #43b581;
      --yellow: #faa61a;
      --red:    #f04747;
      --gray:   #72767d;
      --card:   #2f3136;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 0 24px;
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      width: 100%;
      background: var(--dark);
      text-align: center;
      padding: 14px 0;
    }
    header h1 {
      font-size: 1.45rem;
      color: var(--accent);
      letter-spacing: .5px;
    }

    /* ── Clock ───────────────────────────────────────────────── */
    #clock-wrap {
      text-align: center;
      padding: 28px 0 8px;
    }
    #clock {
      font-size: 5.5rem;
      font-weight: 700;
      letter-spacing: 4px;
      line-height: 1;
      transition: color .3s;
    }
    #clock.urgent { color: var(--red); }
    #status {
      margin-top: 8px;
      font-size: .95rem;
      color: var(--gray);
      min-height: 1.4em;
    }

    /* ── Settings card ───────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: 8px;
      padding: 18px 24px;
      width: min(520px, 96vw);
      margin-top: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: 170px 1fr;
      align-items: center;
      margin-bottom: 14px;
      gap: 8px;
    }
    .row:last-child { margin-bottom: 0; }

    label.row-label {
      font-size: .82rem;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    /* Duration spinners */
    .dur-group { display: flex; align-items: center; gap: 4px; }
    .dur-group input[type=number] {
      width: 58px;
      background: var(--dark);
      border: 1px solid #444;
      border-radius: 4px;
      color: var(--fg);
      font-size: 1.1rem;
      text-align: center;
      padding: 4px 2px;
    }
    .dur-group span { color: var(--fg); font-size: 1.1rem; }

    /* Volume slider */
    .vol-group { display: flex; align-items: center; gap: 10px; }
    input[type=range] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }
    #vol-pct { min-width: 40px; font-size: .9rem; }

    /* Radio groups */
    .radio-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--dark);
      border: 1px solid #444;
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: .85rem;
      transition: border-color .15s, background .15s;
    }
    .radio-group input[type=radio] { accent-color: var(--accent); }
    .radio-group label:has(input:checked) {
      border-color: var(--accent);
      background: #3c4175;
    }

    /* Voice selector */
    select {
      background: var(--dark);
      color: var(--fg);
      border: 1px solid #444;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: .9rem;
      width: 100%;
      cursor: pointer;
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    button {
      border: none;
      border-radius: 5px;
      color: #fff;
      font-size: .95rem;
      font-weight: 700;
      padding: 10px 26px;
      cursor: pointer;
      transition: filter .15s, transform .08s;
      letter-spacing: .4px;
    }
    button:active { transform: scale(.97); }
    button:hover:not(:disabled) { filter: brightness(1.12); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    #btn-start  { background: var(--green); }
    #btn-test   { background: #ffffff; color: #111827; border: 2px solid #111827; }
    #btn-pause  { background: var(--yellow); }
    #btn-stop   { background: var(--red); }

    /* ── Screen flash ──────────────────────────────────────────── */
    @keyframes screenFlash {
      0%, 49% { background: #6b0000; }
      50%, 100% { background: var(--bg); }
    }
    body.flashing { animation: screenFlash 0.5s steps(1) infinite; }

    /* ── Footer ──────────────────────────────────────────────── */
    footer {
      width: 100%;
      background: var(--dark);
      text-align: center;
      font-size: .75rem;
      color: var(--gray);
      padding: 10px 16px;
      margin-top: auto;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>Discord Countdown Timer</h1>
</header>

<div id="clock-wrap">
  <div id="clock">00:00</div>
  <div id="status">Ready</div>
</div>

<div class="card">

  <!-- Duration -->
  <div class="row">
    <label class="row-label">Duration</label>
    <div class="dur-group">
      <input type="number" id="dur-min" min="0" max="99" value="1" />
      <span>m</span>
      <input type="number" id="dur-sec" min="0" max="59" value="0" />
      <span>s</span>
    </div>
  </div>

  <!-- Volume -->
  <div class="row">
    <label class="row-label">Volume</label>
    <div class="vol-group">
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8" />
      <span id="vol-pct">80%</span>
    </div>
  </div>

  <!-- Rate -->
  <div class="row">
    <label class="row-label">Speech Rate</label>
    <div class="vol-group">
      <input type="range" id="rate" min="0.5" max="2" step="0.05" value="1" />
      <span id="rate-val">1.0×</span>
    </div>
  </div>

  <!-- Announce interval -->
  <div class="row">
    <label class="row-label">Announce every</label>
    <div class="radio-group" id="interval-group">
      <label><input type="radio" name="interval" value="1" checked /> 1 s</label>
      <label><input type="radio" name="interval" value="5" />          5 s</label>
      <label><input type="radio" name="interval" value="10" />        10 s</label>
      <label><input type="radio" name="interval" value="30" />        30 s</label>
    </div>
  </div>

  <!-- Final-N countdown -->
  <div class="row">
    <label class="row-label">Always count last</label>
    <div class="radio-group" id="final-group">
      <label><input type="radio" name="final" value="5"  />          5 s</label>
      <label><input type="radio" name="final" value="10" checked /> 10 s</label>
      <label><input type="radio" name="final" value="30" />         30 s</label>
      <label><input type="radio" name="final" value="60" />         60 s</label>
    </div>
  </div>

  <!-- Flash threshold -->
  <div class="row">
    <label class="row-label">Flash screen at last</label>
    <div class="vol-group">
      <input type="range" id="flash-slider" min="0" max="90" step="1" value="0" />
      <input type="number" id="flash-num" min="0" max="90" value="0"
             style="width:54px;background:var(--dark);border:1px solid #444;
                    border-radius:4px;color:var(--fg);font-size:1rem;
                    text-align:center;padding:4px 2px;" />
      <span style="font-size:.9rem;color:var(--gray)">s &nbsp;(0 = off)</span>
    </div>
  </div>

  <!-- Voice -->
  <div class="row">
    <label class="row-label">Voice</label>
    <div style="display:flex;flex-direction:column;gap:5px;width:100%">
      <select id="tts-engine">
        <option value="cloud" selected>Google TTS Voice (Cloud)</option>
        <option value="local">Local Microsoft/System Voice</option>
      </select>
      <select id="voice-select" style="display:none">
        <option value="">Loading local voices...</option>
      </select>
      <span id="tts-note" style="font-size:.75rem;color:var(--gray)">Cloud mode: Google TTS (single voice)</span>
    </div>
  </div>

</div>

<div class="btn-row">
  <button id="btn-start">START</button>
  <button id="btn-test">TEST VOICE</button>
  <button id="btn-pause" disabled>PAUSE</button>
  <button id="btn-stop"  disabled>STOP</button>
</div>

<footer>
  <strong>Use in Discord:</strong>
  Set Windows playback device to <em>CABLE Input (VB-Audio Virtual Cable)</em>,
  then select <em>CABLE Output</em> as your Discord mic input.<br/>
  Get VB-Cable free at <a href="https://vb-audio.com/Cable/" target="_blank">vb-audio.com/Cable</a>
</footer>

<script>
// ── Number → spoken words ──────────────────────────────────────────────────
const ONES = ['', 'one','two','three','four','five','six','seven','eight',
              'nine','ten','eleven','twelve','thirteen','fourteen','fifteen',
              'sixteen','seventeen','eighteen','nineteen'];
const TENS = ['','','twenty','thirty','forty','fifty',
              'sixty','seventy','eighty','ninety'];

function secsToWords(n) {
  if (n === 0) return 'zero';
  if (n < 20)  return ONES[n];
  if (n < 100) {
    const t = Math.floor(n / 10), o = n % 10;
    return TENS[t] + (o ? ' ' + ONES[o] : '');
  }
  if (n < 1000) {
    const h = Math.floor(n / 100), r = n % 100;
    return ONES[h] + ' hundred' + (r ? ' ' + secsToWords(r) : '');
  }
  const th = Math.floor(n / 1000), r = n % 1000;
  return secsToWords(th) + ' thousand' + (r ? ' ' + secsToWords(r) : '');
}

// ── TTS (Google cloud + local Microsoft/system) ───────────────────────────
const audioCache = new Map();
let currentAudio = null;
let countdownToken = 0;
let audioUnlocked = false;
let browserVoiceReady = false;
let lastTtsError = '';
let lastCloudProvider = '';

const browserSynth = window.speechSynthesis;

function initBrowserVoices() {
  browserVoiceReady = (browserSynth.getVoices() || []).length > 0;
}
browserSynth.onvoiceschanged = initBrowserVoices;
initBrowserVoices();

function populateLocalVoices() {
  const sel = document.getElementById('voice-select');
  const voices = browserSynth.getVoices() || [];
  const english = voices.filter(v => /en/i.test(v.lang));
  const preferred = english.filter(v => /microsoft/i.test(v.name));
  const list = preferred.length ? preferred : (english.length ? english : voices);

  sel.innerHTML = '';
  list.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = `${v.name} (${v.lang})`;
    sel.appendChild(opt);
  });

  if (!list.length) {
    const opt = document.createElement('option');
    opt.value = '';
    opt.textContent = 'No local voices found';
    sel.appendChild(opt);
  }

  sel._voiceList = list;
}
browserSynth.onvoiceschanged = () => {
  initBrowserVoices();
  populateLocalVoices();
};
populateLocalVoices();

async function unlockAudio() {
  if (audioUnlocked) return true;
  try {
    // User-gesture unlock for stricter autoplay policies (Firefox).
    const silent = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAIlYAACJWAAACABAAZGF0YQAAAAA=');
    silent.volume = 0;
    await silent.play();
    silent.pause();
    audioUnlocked = true;
    return true;
  } catch {
    return false;
  }
}

function googleTtsUrl(text) {
  return 'https://translate.google.com/translate_tts'
    + '?ie=UTF-8'
    + '&tl=en-US'
    + '&client=tw-ob'
    + '&q=' + encodeURIComponent(text);
}

function localUrl(text) {
  const voice = document.getElementById('voice-select').value;
  return 'http://127.0.0.1:8765/tts'
    + '?voice=' + encodeURIComponent(voice)
    + '&text='  + encodeURIComponent(text);
}

function cacheKey(text) {
  return document.getElementById('tts-engine').value + '::'
    + document.getElementById('voice-select').value + '::' + text;
}

async function buildAudio(text) {
  const engine = document.getElementById('tts-engine').value;
  if (engine === 'cloud') {
    const a = new Audio(googleTtsUrl(text));
    lastCloudProvider = 'Google TTS';
    return a;
  }
  if (engine === 'local') throw new Error('local mode uses speech synthesis');
  throw new Error('unknown tts engine');
}

function loadClip(text) {
  const key = cacheKey(text);
  if (audioCache.has(key)) return Promise.resolve(audioCache.get(key));
  return buildAudio(text).then(a => {
    audioCache.set(key, a);
    lastTtsError = '';
    return a;
  }).catch(err => {
    lastTtsError = String(err && err.message ? err.message : err || 'unknown tts error');
    return null;
  });
}

function primeUpcoming(count, interval, final) {
  const upcoming = [];
  for (let i = count - 1; i >= Math.max(1, count - 8); i--) {
    if (i <= final || i % interval === 0) upcoming.push(secsToWords(i));
  }
  Promise.all(upcoming.map(loadClip)).catch(() => {});
}

function speak(text) {
  return new Promise(resolve => {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    const volume = parseFloat(document.getElementById('volume').value);
    const rate   = parseFloat(document.getElementById('rate').value);
    const key = cacheKey(text);
    const fallbackSpeak = () => {
      try {
        const utt = new SpeechSynthesisUtterance(text);
        const sel = document.getElementById('voice-select');
        const list = sel._voiceList || [];
        const idx = parseInt(sel.value, 10);
        const voices = browserSynth.getVoices() || [];
        const pick = (Number.isInteger(idx) && idx >= 0 && idx < list.length)
          ? list[idx]
          : (voices.find(v => /en/i.test(v.lang)) || voices[0]);
        if (pick) utt.voice = pick;
        utt.volume = volume;
        utt.rate = rate;
        utt.onend = () => resolve();
        utt.onerror = () => resolve();
        browserSynth.cancel();
        browserSynth.speak(utt);
      } catch {
        resolve();
      }
    };

    if (document.getElementById('tts-engine').value === 'local') {
      fallbackSpeak();
      return;
    }

    const use = a => {
      a.volume       = volume;
      a.playbackRate = rate;
      a.currentTime  = 0;
      currentAudio   = a;
      a.onended = () => { currentAudio = null; resolve(); };
      a.onerror = () => { currentAudio = null; fallbackSpeak(); };
      a.play().catch(() => {
        currentAudio = null;
        fallbackSpeak();
      });
    };

    if (audioCache.has(key)) {
      use(audioCache.get(key));
      return;
    }
    loadClip(text).then(a => {
      if (!a) return fallbackSpeak();
      use(a);
    }).catch(() => fallbackSpeak());
  });
}

// ── UI helpers ─────────────────────────────────────────────────────────────
const clockEl  = document.getElementById('clock');
const statusEl = document.getElementById('status');
const btnStart = document.getElementById('btn-start');
const btnTest  = document.getElementById('btn-test');
const btnPause = document.getElementById('btn-pause');
const btnStop  = document.getElementById('btn-stop');

document.getElementById('volume').addEventListener('input', e => {
  document.getElementById('vol-pct').textContent =
    Math.round(e.target.value * 100) + '%';
  if (currentAudio) currentAudio.volume = parseFloat(e.target.value);
});
document.getElementById('rate').addEventListener('input', e => {
  document.getElementById('rate-val').textContent =
    parseFloat(e.target.value).toFixed(2) + '×';
});

// Keep flash slider and number input in sync
const flashSlider = document.getElementById('flash-slider');
const flashNum    = document.getElementById('flash-num');
flashSlider.addEventListener('input', () => { flashNum.value = flashSlider.value; });
flashNum.addEventListener('input', () => {
  const v = Math.min(90, Math.max(0, parseInt(flashNum.value, 10) || 0));
  flashSlider.value = v;
});

function formatClock(s) {
  const m = Math.floor(s / 60), r = s % 60;
  return String(m).padStart(2,'0') + ':' + String(r).padStart(2,'0');
}

function setStatus(s) { statusEl.textContent = s; }

function getDuration() {
  const m = parseInt(document.getElementById('dur-min').value, 10) || 0;
  const s = parseInt(document.getElementById('dur-sec').value, 10) || 0;
  return Math.max(0, m * 60 + s);
}
function getInterval() {
  return parseInt(document.querySelector('input[name=interval]:checked').value, 10);
}
function getFinal() {
  return parseInt(document.querySelector('input[name=final]:checked').value, 10);
}
function getFlashAt() {
  return Math.min(90, Math.max(0, parseInt(document.getElementById('flash-num').value, 10) || 0));
}
function startFlash() { document.body.classList.add('flashing'); }
function stopFlash()  { document.body.classList.remove('flashing'); }

function updateTtsNote() {
  const mode = document.getElementById('tts-engine').value;
  const sel = document.getElementById('voice-select');
  const isLocal = mode === 'local';
  sel.style.display = isLocal ? 'block' : 'none';
  document.getElementById('tts-note').textContent = isLocal
    ? 'Local mode: use your installed Microsoft/system voices'
    : 'Cloud mode: Google TTS (single voice, internet required)';
  audioCache.clear();
}
document.getElementById('tts-engine').addEventListener('change', updateTtsNote);
document.getElementById('voice-select').addEventListener('change', () => audioCache.clear());
updateTtsNote();

// ── Countdown engine ───────────────────────────────────────────────────────
let running   = false;
let paused    = false;
let remaining = 0;
let pauseResolve = null;
const MAX_TICK_DRIFT_MS = 1500;

async function countdown() {
  const token = countdownToken;
  const total    = remaining;
  const interval = getInterval();
  const final    = getFinal();
  let nextTickAt = performance.now();

  for (let count = total; count > 0; count--) {
    if (!running) return;

    // Pause gate
    if (paused) {
      await new Promise(res => { pauseResolve = res; });
      pauseResolve = null;
      nextTickAt = performance.now();
    }
    if (!running) return;

    // Update clock
    remaining = count;
    clockEl.textContent = formatClock(count);
    clockEl.classList.toggle('urgent', count <= 10);

    // Flash screen?
    const flashAt = getFlashAt();
    if (flashAt > 0 && count <= flashAt) startFlash();

    // Speak?
    if (count <= final || count % interval === 0) {
      primeUpcoming(count, interval, final);
      // Keep countdown ticks real-time; speech playback should not delay timer updates.
      speak(secsToWords(count));
    }
    if (token !== countdownToken) return;
    const now = performance.now();
    if (now - nextTickAt > MAX_TICK_DRIFT_MS) nextTickAt = now;
    nextTickAt += 1000;
    await new Promise(res => setTimeout(res, Math.max(0, nextTickAt - performance.now())));
  }

  if (running) {
    clockEl.textContent = '00:00';
    clockEl.classList.remove('urgent');
    stopFlash();
    await speak("Time's up!");
    setStatus('Done! ✅');
    resetButtons();
    running = false;
  }
}

// ── Button handlers ────────────────────────────────────────────────────────
btnStart.addEventListener('click', async () => {
  const dur = getDuration();
  if (dur <= 0) { alert('Set a duration greater than 0.'); return; }
  countdownToken += 1;

  const unlocked = await unlockAudio();
  if (!unlocked) {
    setStatus('Audio blocked by browser. Allow autoplay for this file/tab.');
  }

  // Start immediately; prefetch in background
  btnStart.disabled = true;
  btnPause.disabled = false;
  btnStop .disabled = true;
  clockEl.textContent = formatClock(dur);
  clockEl.classList.remove('urgent');
  audioCache.clear();

  running   = true;
  paused    = false;
  remaining = dur;
  btnStop .disabled = false;
  setStatus('Running…');
  loadClip(secsToWords(dur)).catch(() => {});
  loadClip("Time's up!").catch(() => {});
  countdown();
});

btnTest.addEventListener('click', async () => {
  const unlocked = await unlockAudio();
  if (!unlocked) {
    setStatus('Audio blocked by Firefox autoplay setting. Allow autoplay for this page.');
    return;
  }
  setStatus('Testing voice…');
  await speak('three');
  if (lastTtsError && document.getElementById('tts-engine').value === 'cloud') {
    setStatus('Cloud issue (' + lastTtsError + '), used browser fallback');
  } else {
    const mode = document.getElementById('tts-engine').value;
    if (mode === 'cloud' && lastCloudProvider) {
      setStatus('Voice test complete via ' + lastCloudProvider);
    } else {
      setStatus('Voice test complete');
    }
  }
});

btnPause.addEventListener('click', () => {
  if (paused) {
    paused = false;
    btnPause.textContent = 'PAUSE';
    setStatus('Running…');
    if (pauseResolve) pauseResolve();
  } else {
    paused = true;
    btnPause.textContent = 'RESUME';
    setStatus('Paused');
    if (currentAudio) { currentAudio.pause(); }
  }
});

btnStop.addEventListener('click', () => {
  countdownToken += 1;
  running = false;
  paused  = false;
  browserSynth.cancel();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (pauseResolve) pauseResolve();
  stopFlash();
  clockEl.textContent = '00:00';
  clockEl.classList.remove('urgent');
  setStatus('Stopped');
  resetButtons();
});

function resetButtons() {
  btnStart.disabled = false;
  btnPause.disabled = true;
  btnStop .disabled = true;
  btnPause.textContent = 'PAUSE';
}
</script>
</body>
</html>
